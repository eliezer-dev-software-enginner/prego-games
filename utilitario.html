<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Gerador de Botões GBA</title>
    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }

      textarea {
        width: 100%;
        height: 200px;
        margin-bottom: 10px;
      }

      button {
        margin: 5px;
        padding: 10px;
        cursor: pointer;
        border: none;
        background: #eee;
        transition: 0.2s;
      }

      button:hover {
        background: #ddd;
      }

      .copiado {
        background: #4caf50 !important;
        color: white;
      }

      #buttons {
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <h2>Colar JSON</h2>

    <textarea id="jsonInput" placeholder="Cole seu JSON aqui..."></textarea>
    <br />
    <button onclick="gerarBotoes()">Gerar botões</button>

    <div id="buttons"></div>

    <script>
      function gerarBotoes() {
        const container = document.getElementById("buttons");
        container.innerHTML = "";

        let data;

        try {
          data = JSON.parse(document.getElementById("jsonInput").value);
        } catch (e) {
          alert("JSON inválido");
          return;
        }

        data.forEach((item) => {
          const titulo = item.name + " GBA";

          const btn = document.createElement("button");
          btn.innerText = titulo;

          btn.onclick = () => {
            navigator.clipboard
              .writeText(titulo)
              .then(() => {
                btn.classList.add("copiado");
              })
              .catch(() => {
                alert("Erro ao copiar");
              });
          };

          container.appendChild(btn);
        });
      }
    </script>
  </body>
</html>
